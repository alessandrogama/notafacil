services:
  postgres:
    image: postgres:17-alpine
    container_name: notafacil-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notafacil -d notafacil"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data: